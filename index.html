<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計管理システム</title>
  <style>
    :root {
      --bg-color: #f4f5f7;
      --card-bg: #ffffff;
      --text-color: #2d3748;
      --text-muted: #718096;
      --border-color: #e2e8f0;
      --primary-color: #4a5568;
      --primary-hover: #2d3748;
      --accent-color: #3182ce;
      --danger-color: #e53e3e;
      --success-color: #38a169;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      padding: 24px 16px;
      font-size: 16px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-hover);
    }

    /* タブナビゲーション */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 4px;
      overflow-x: auto;
    }

    .tab-btn {
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      border-radius: var(--radius) var(--radius) 0 0;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--accent-color);
      border-bottom: 3px solid var(--accent-color);
      background-color: #edf2f7;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* カード・フォームスタイル */
    .card {
      background-color: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--primary-color);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--primary-color);
    }

    .required {
      color: var(--danger-color);
      margin-left: 4px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: #fafafa;
      color: var(--text-color);
      transition: border-color 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      background-color: #ffffff;
    }

    /* ボタン類 */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      min-height: 48px;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: #ffffff;
      width: 100%;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-danger {
      background-color: var(--danger-color);
      color: #ffffff;
    }

    .btn-danger:hover {
      background-color: #c53030;
    }

    .btn-secondary {
      background-color: #cbd5e0;
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background-color: #a0aec0;
    }

    /* テーブル・リスト表示 */
    .table-responsive {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 15px;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #edf2f7;
      color: var(--primary-color);
      font-weight: 600;
    }

    tr:hover {
      background-color: #f7fafc;
    }

    .action-btns {
      display: flex;
      gap: 6px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 14px;
      min-height: auto;
      border-radius: 6px;
    }

    /* 通知メッセージ */
    .message-box {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      font-size: 15px;
    }

    .message-box.success {
      background-color: #c6f6d5;
      color: #22543d;
      display: block;
    }

    .message-box.error {
      background-color: #fed7d7;
      color: #742a2a;
      display: block;
    }

    /* 非表示コントロール */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>家計管理システム</h1>
    </header>

    <div id="messageBox" class="message-box"></div>

    <!-- タブメニュー -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('transactionTab')">収支登録・履歴</button>
      <button class="tab-btn" onclick="switchTab('recurringTab')">定期収支管理</button>
      <button class="tab-btn" onclick="switchTab('categoryTab')">分類項目設定</button>
    </div>

    <!-- 1. 収支登録・履歴タブ -->
    <div id="transactionTab" class="tab-content active">
      <div class="card">
        <h2 id="formTitle">収支データの新規登録</h2>
        <form id="transactionForm" onsubmit="handleTransactionSubmit(event)">
          <input type="hidden" id="transId" value="">

          <div class="form-group">
            <label>日付<span class="required">*</span></label>
            <input type="date" id="transDate" required>
          </div>

          <div class="form-group">
            <label>収支種別<span class="required">*</span></label>
            <select id="transType" onchange="toggleIncomeRecipientField()" required>
              <option value="支出">支出</option>
              <option value="収入">収入</option>
            </select>
          </div>

          <!-- 収入時のみ表示される動的フィールド -->
          <div class="form-group hidden" id="incomeRecipientGroup">
            <label>収入取得者<span class="required">*</span></label>
            <input type="text" id="incomeRecipient" placeholder="例: 夫、妻">
          </div>

          <div class="form-group">
            <label>分類項目<span class="required">*</span></label>
            <select id="transCategory" required>
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="form-group">
            <label>金額 (円)<span class="required">*</span></label>
            <input type="number" id="transAmount" min="1" placeholder="1000" required>
          </div>

          <div class="form-group">
            <label>メモ・詳細</label>
            <input type="text" id="transMemo" placeholder="スーパーでの買い物など">
          </div>

          <div class="btn-group">
            <button type="submit" class="btn btn-primary" id="transSubmitBtn">保存する</button>
            <button type="button" class="btn btn-secondary hidden" id="transCancelBtn" onclick="resetTransactionForm()">キャンセル</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>収支履歴一覧</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>種別</th>
                <th>取得者</th>
                <th>分類</th>
                <th>金額</th>
                <th>メモ</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="transactionTableBody">
              <tr><td colspan="7">データを読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 2. 定期収支管理タブ -->
    <div id="recurringTab" class="tab-content">
      <div class="card">
        <h2 id="recurringFormTitle">定期収支の新規登録</h2>
        <form id="recurringForm" onsubmit="handleRecurringSubmit(event)">
          <input type="hidden" id="recId" value="">

          <div class="form-group">
            <label>名称<span class="required">*</span></label>
            <input type="text" id="recName" placeholder="例: 家賃、給与" required>
          </div>

          <div class="form-group">
            <label>収支種別<span class="required">*</span></label>
            <select id="recType" required>
              <option value="支出">支出</option>
              <option value="収入">収入</option>
            </select>
          </div>

          <div class="form-group">
            <label>分類項目<span class="required">*</span></label>
            <select id="recCategory" required>
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="form-group">
            <label>金額 (円)<span class="required">*</span></label>
            <input type="number" id="recAmount" min="1" placeholder="80000" required>
          </div>

          <div class="form-group">
            <label>毎月の決済日(日)<span class="required">*</span></label>
            <input type="number" id="recDay" min="1" max="31" placeholder="25" required>
          </div>

          <div class="btn-group">
            <button type="submit" class="btn btn-primary" id="recSubmitBtn">定期収支を保存</button>
            <button type="button" class="btn btn-secondary hidden" id="recCancelBtn" onclick="resetRecurringForm()">キャンセル</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>登録済み定期収支一覧</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>名称</th>
                <th>種別</th>
                <th>分類</th>
                <th>金額</th>
                <th>決済日</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="recurringTableBody">
              <tr><td colspan="6">データを読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 3. 分類項目設定タブ -->
    <div id="categoryTab" class="tab-content">
      <div class="card">
        <h2>新規分類項目の追加</h2>
        <form id="categoryForm" onsubmit="handleCategorySubmit(event)">
          <div class="form-group">
            <label>分類項目名<span class="required">*</span></label>
            <input type="text" id="newCategoryName" placeholder="例: 食費、通信費" required>
          </div>
          <div class="form-group">
            <label>対象種別<span class="required">*</span></label>
            <select id="categoryType" required>
              <option value="共通">共通 (収入・支出両方)</option>
              <option value="支出">支出専用</option>
              <option value="収入">収入専用</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">分類項目を追加</button>
        </form>
      </div>

      <div class="card">
        <h2>登録済み分類項目一覧</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>分類項目名</th>
                <th>対象種別</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="categoryTableBody">
              <tr><td colspan="3">データを読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 状態管理
    let categories = [];
    let transactions = [];
    let recurrings = [];

    // 初期化処理
    window.onload = function() {
      // 本日の日付をデフォルト設定
      document.getElementById('transDate').valueAsDate = new Date();
      loadAllData();
    };

    function showMessage(msg, isError = false) {
      const box = document.getElementById('messageBox');
      box.textContent = msg;
      box.className = 'message-box ' + (isError ? 'error' : 'success');
      setTimeout(() => {
        box.className = 'message-box hidden';
      }, 4000);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.currentTarget.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    // 収入取得者フィールドの表示切替
    function toggleIncomeRecipientField() {
      const type = document.getElementById('transType').value;
      const recipientGroup = document.getElementById('incomeRecipientGroup');
      const recipientInput = document.getElementById('incomeRecipient');

      if (type === '収入') {
        recipientGroup.classList.remove('hidden');
        recipientInput.required = true;
      } else {
        recipientGroup.classList.add('hidden');
        recipientInput.required = false;
        recipientInput.value = '';
      }
    }

    // 全データロード
    function loadAllData() {
      google.script.run.withSuccessHandler(data => {
        categories = data.categories || [];
        transactions = data.transactions || [];
        recurrings = data.recurrings || [];
        
        renderCategories();
        renderTransactions();
        renderRecurrings();
      }).withFailureHandler(err => {
        showMessage('データの読み込みに失敗しました: ' + err, true);
      }).getInitialData();
    }

    // --- 分類項目マスター関連 ---
    function renderCategories() {
      // ドロップダウン更新
      const transCatSelect = document.getElementById('transCategory');
      const recCatSelect = document.getElementById('recCategory');
      
      transCatSelect.innerHTML = '<option value="">選択してください</option>';
      recCatSelect.innerHTML = '<option value="">選択してください</option>';

      categories.forEach(cat => {
        const opt1 = document.createElement('option');
        opt1.value = cat.name;
        opt1.textContent = cat.name;
        transCatSelect.appendChild(opt1);

        const opt2 = document.createElement('option');
        opt2.value = cat.name;
        opt2.textContent = cat.name;
        recCatSelect.appendChild(opt2);
      });

      // 一覧テーブル更新
      const tbody = document.getElementById('categoryTableBody');
      if (categories.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">登録された分類項目がありません</td></tr>';
        return;
      }

      tbody.innerHTML = categories.map(cat => `
        <tr>
          <td>${cat.name}</td>
          <td>${cat.type || '共通'}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteCategory('${cat.id}')">削除</button>
          </td>
        </tr>
      `).join('');
    }

    function handleCategorySubmit(e) {
      e.preventDefault();
      const name = document.getElementById('newCategoryName').value.trim();
      const type = document.getElementById('categoryType').value;

      if (!name) return;

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          showMessage('分類項目を追加しました');
          document.getElementById('categoryForm').reset();
          loadAllData();
        } else {
          showMessage(res.message, true);
        }
      }).addCategory({ name, type });
    }

    function deleteCategory(id) {
      if (!confirm('この分類項目を削除してもよろしいですか？')) return;

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          showMessage('分類項目を削除しました');
          loadAllData();
        } else {
          showMessage(res.message, true);
        }
      }).deleteCategory(id);
    }

    // --- 収支データ関連 ---
    function renderTransactions() {
      const tbody = document.getElementById('transactionTableBody');
      if (transactions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">収支データがありません</td></tr>';
        return;
      }

      tbody.innerHTML = transactions.map(item => `
        <tr>
          <td>${item.date}</td>
          <td>${item.type}</td>
          <td>${item.recipient || '-'}</td>
          <td>${item.category}</td>
          <td>¥${Number(item.amount).toLocaleString()}</td>
          <td>${item.memo || ''}</td>
          <td>
            <div class="action-btns">
              <button class="btn btn-secondary btn-sm" onclick="editTransaction('${item.id}')">編集</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTransaction('${item.id}')">削除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function handleTransactionSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('transId').value;
      const type = document.getElementById('transType').value;
      const recipient = type === '収入' ? document.getElementById('incomeRecipient').value : '';

      const payload = {
        id: id || null,
        date: document.getElementById('transDate').value,
        type: type,
        recipient: recipient,
        category: document.getElementById('transCategory').value,
        amount: Number(document.getElementById('transAmount').value),
        memo: document.getElementById('transMemo').value
      };

      const funcName = id ? 'updateTransaction' : 'addTransaction';

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          showMessage(id ? '収支データを更新しました' : '収支データを追加しました');
          resetTransactionForm();
          loadAllData();
        } else {
          showMessage(res.message, true);
        }
      })[funcName](payload);
    }

    function editTransaction(id) {
      const item = transactions.find(t => t.id === id);
      if (!item) return;

      document.getElementById('transId').value = item.id;
      document.getElementById('transDate').value = item.date;
      document.getElementById('transType').value = item.type;
      
      toggleIncomeRecipientField();
      if (item.type === '収入') {
        document.getElementById('incomeRecipient').value = item.recipient || '';
      }

      document.getElementById('transCategory').value = item.category;
      document.getElementById('transAmount').value = item.amount;
      document.getElementById('transMemo').value = item.memo || '';

      document.getElementById('formTitle').textContent = '収支データの編集';
      document.getElementById('transSubmitBtn').textContent = '更新する';
      document.getElementById('transCancelBtn').classList.remove('hidden');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetTransactionForm() {
      document.getElementById('transId').value = '';
      document.getElementById('transactionForm').reset();
      document.getElementById('transDate').valueAsDate = new Date();
      document.getElementById('formTitle').textContent = '収支データの新規登録';
      document.getElementById('transSubmitBtn').textContent = '保存する';
      document.getElementById('transCancelBtn').classList.add('hidden');
      toggleIncomeRecipientField();
    }

    function deleteTransaction(id) {
      if (!confirm('この収支データを削除しますか？')) return;

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          showMessage('収支データを削除しました');
          loadAllData();
        } else {
          showMessage(res.message, true);
        }
      }).deleteTransaction(id);
    }

    // --- 定期収支関連 ---
    function renderRecurrings() {
      const tbody = document.getElementById('recurringTableBody');
      if (recurrings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">定期収支が登録されていません</td></tr>';
        return;
      }

      tbody.innerHTML = recurrings.map(item => `
        <tr>
          <td>${item.name}</td>
          <td>${item.type}</td>
          <td>${item.category}</td>
          <td>¥${Number(item.amount).toLocaleString()}</td>
          <td>毎月 ${item.day} 日</td>
          <td>
            <div class="action-btns">
              <button class="btn btn-secondary btn-sm" onclick="editRecurring('${item.id}')">編集</button>
              <button class="btn btn-danger btn-sm" onclick="deleteRecurring('${item.id}')">削除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function handleRecurringSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('recId').value;

      const payload = {
        id: id || null,
        name: document.getElementById('recName').value.trim(),
        type: document.getElementById('recType').value,
        category: document.getElementById('recCategory').value,
        amount: Number(document.getElementById('recAmount').value),
        day: Number(document.getElementById('recDay').value)
      };

      const funcName = id ? 'updateRecurring' : 'addRecurring';

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          showMessage(id ? '定期収支を更新しました' : '定期収支を登録しました');
          resetRecurringForm();
          loadAllData();
        } else {
          showMessage(res.message, true);
        }
      })[funcName](payload);
    }

    function editRecurring(id) {
      const item = recurrings.find(r => r.id === id);
      if (!item) return;

      document.getElementById('recId').value = item.id;
      document.getElementById('recName').value = item.name;
      document.getElementById('recType').value = item.type;
      document.getElementById('recCategory').value = item.category;
      document.getElementById('recAmount').value = item.amount;
      document.getElementById('recDay').value = item.day;

      document.getElementById('recurringFormTitle').textContent = '定期収支の編集';
      document.getElementById('recSubmitBtn').textContent = '更新する';
      document.getElementById('recCancelBtn').classList.remove('hidden');
    }

    function resetRecurringForm() {
      document.getElementById('recId').value = '';
      document.getElementById('recurringForm').reset();
      document.getElementById('recurringFormTitle').textContent = '定期収支の新規登録';
      document.getElementById('recSubmitBtn').textContent = '定期収支を保存';
      document.getElementById('recCancelBtn').classList.add('hidden');
    }

    function deleteRecurring(id) {
      if (!confirm('この定期収支項目を削除しますか？')) return;

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          showMessage('定期収支を削除しました');
          loadAllData();
        } else {
          showMessage(res.message, true);
        }
      }).deleteRecurring(id);
    }
  </script>
</body>
</html>
